# sops configuration.
#
# `admin` is this machine's age key (~/.config/sops/age/keys.txt). The host
# recipients are commented out until each NixOS host exists: derive them from
# the host SSH key and re-key (see README "Secrets"):
#   nix run nixpkgs#ssh-to-age -- -i /etc/ssh/ssh_host_ed25519_key.pub
#   nix run nixpkgs#sops -- updatekeys secrets/k3s.yaml
#
# secrets/k3s.yaml holds: k3s-token, the Flux git deploy key, the Sealed
# Secrets controller key (cert+key), and the dell `code` SSH key.
keys:
  - &admin age1d93mez999rx9dmjtdjyujnsffvchehyfv8v8jqfurter2pydju5s3xthlt
  # - &dell age1REPLACE_DELL
  # - &asus age1REPLACE_ASUS

creation_rules:
  - path_regex: secrets/k3s\.yaml$
    key_groups:
      - age:
          - *admin
          # - *dell
          # - *asus
